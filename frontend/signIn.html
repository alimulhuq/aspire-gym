<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Aspire — Sign In</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="auth.css"/>
</head>
<body class="auth-page">
    <div class="auth-container">

        <div class="auth-left">
        <div class="brand">
            <h1 class="logo">Aspire</h1>
            <p>Welcome back, hero</p>
        </div>
        </div>

        <div class="auth-right">

            <div class="form-wrapper">
                <h2>Sign In</h2>
                <p class="sub">Access your workouts & progress</p>
                
                <form class="auth-form">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="you@example.com" required/>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="password-wrapper">
                        <input type="password" id="password" placeholder="••••••••" required/>
                        <button type="button" class="toggle-password"><i class="far fa-eye"></i></button>
                        </div>
                    </div>

                    <div class="forgot">
                        <a href="#">Forgot password?</a>
                    </div>

                    <button type="submit" class="btn btn-primary btn-block">
                        Sign In <i class="fas fa-arrow-right"></i>
                    </button>

                    <div class="divider"><span>or continue with</span></div>

                    <div class="social-buttons">
                        <button type="button" class="btn-social google">
                            <i class="fab fa-google"></i> Google
                        </button>
                        <button type="button" class="btn-social apple">
                            <i class="fab fa-apple"></i> Apple
                        </button>
                    </div>

                    <p class="switch-auth">
                        New here? <a href="signup.html">Create an account</a>
                    </p>
                </form>
            </div>
        </div>
    </div>
  
  
</body>
</html>
